<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Eternity Clock</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;           /* 纯黑色背景 */
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: white;
        }

        .clock-container {
            text-align: center;
            padding: 20px;
        }

        .eternity {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.65rem;
            font-weight: 400;
            letter-spacing: 8px;
            margin-bottom: 15px;
            opacity: 0.85;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #time {
            font-family: 'Orbitron', sans-serif;
            font-size: 6.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin: 10px 0;
            background: linear-gradient(90deg, #00f5ff, #00ff9d, #ffff00, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 245, 255, 0.6);
            line-height: 1;
        }

        #date {
            font-size: 1.45rem;
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.9;
            margin-top: 10px;
        }

        .seconds {
            font-size: 2.1rem;
            vertical-align: super;
            margin-left: 8px;
            opacity: 0.9;
        }

        /* 手机小屏适配 */
        @media (max-width: 480px) {
            #time { font-size: 5.6rem; }
            .eternity { font-size: 1.55rem; }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="eternity">eternity</div>
        <div id="time">21:00<span class="seconds">59</span></div>
        <div id="date">2026-04-06 Monday</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('time').innerHTML = 
                `${hours}:${minutes}<span class="seconds">${seconds}</span>`;
            
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const weekdays = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const weekday = weekdays[now.getDay()];
            
            document.getElementById('date').textContent = `${year}-${month}-${day} ${weekday}`;
        }

        setInterval(updateClock, 1000);
        updateClock();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
