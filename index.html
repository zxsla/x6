<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>Eternity Clock</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
            color: white;
        }

        .clock-container {
            text-align: center;
            padding: 20px 30px;
        }

        .eternity {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 8px;
            margin-bottom: 12px;
            opacity: 0.85;
        }

        #time {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.6rem;           /* 再次调小 */
            font-weight: 700;
            letter-spacing: 5px;
            margin: 8px 0 18px 0;
            background: linear-gradient(90deg, #00f5ff, #39ff14, #ffff00, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 245, 255, 0.5);
            line-height: 1;
        }

        #date {
            font-size: 1.38rem;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0.9;
            margin-bottom: 28px;
        }

        .quote {
            font-size: 1.05rem;
            font-weight: 300;
            opacity: 0.78;
            min-height: 1.6em;
            transition: opacity 0.8s ease;
        }

        .seconds {
            font-size: 1.85rem;
            vertical-align: super;
            margin-left: 6px;
            opacity: 0.9;
        }

        /* 小屏手机额外适配 */
        @media (max-width: 480px) {
            #time { 
                font-size: 4.3rem;     /* 更小 */
            }
            .eternity { 
                font-size: 1.4rem; 
            }
        }
    </style>
</head>
<body>
    <div class="clock-container">
        <div class="eternity">eternity</div>
        <div id="time">09:38<span class="seconds">30</span></div>
        <div id="date">2026-04-06 星期一</div>
        <div class="quote" id="quote">珍惜每一刻</div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            
            let hours = now.getHours().toString().padStart(2, '0');
            let minutes = now.getMinutes().toString().padStart(2, '0');
            let seconds = now.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('time').innerHTML = 
                `${hours}:${minutes}<span class="seconds">${seconds}</span>`;
            
            const year = now.getFullYear();
            const month = (now.getMonth() + 1).toString().padStart(2, '0');
            const day = now.getDate().toString().padStart(2, '0');
            const weekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            const weekday = weekdays[now.getDay()];
            
            document.getElementById('date').textContent = `${year}-${month}-${day} ${weekday}`;
        }

        const quotes = [
            "珍惜每一刻",
            "时间即永恒",
            "活在当下",
            "此刻便是永远",
            "每一秒都是礼物",
            "永恒藏于瞬间",
            "慢下来，感受时间",
            "时间温柔且残酷"
        ];

        let currentIndex = 0;

        function showNextQuote() {
            const quoteEl = document.getElementById('quote');
            quoteEl.style.opacity = 0;

            setTimeout(() => {
                currentIndex = (currentIndex + 1) % quotes.length;
                quoteEl.textContent = quotes[currentIndex];
                quoteEl.style.opacity = 1;
            }, 600);
        }

        setInterval(updateClock, 1000);
        updateClock();
        document.getElementById('quote').textContent = quotes[0];
        setInterval(showNextQuote, 10000);

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
